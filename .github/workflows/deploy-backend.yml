name: Deploy backend to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/neumes-playground
            git pull origin main
            cd backend
            .venv/bin/pip install --no-cache-dir -q -e .
            systemctl restart neumes-backend
            sleep 10
            curl -sf --retry 3 --retry-delay 5 http://127.0.0.1:8000/health || exit 1
            echo "Backend deployed successfully"
